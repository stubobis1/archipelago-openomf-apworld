<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archipelago PoE — Authorization Successful</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0d0d;
            color: #c8b99a;
            font-family: 'Georgia', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 540px;
        }

        .gem {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
        }

        .gem svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 18px #a5f3a5cc);
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { filter: drop-shadow(0 0 12px #a5f3a5aa); }
            50%       { filter: drop-shadow(0 0 28px #a5f3a5ff); }
        }

        h1 {
            font-size: 1.8rem;
            color: #e8d5b0;
            margin-bottom: 0.75rem;
            letter-spacing: 0.04em;
        }

        p {
            font-size: 1rem;
            color: #9a8a6a;
            line-height: 1.6;
        }

        .divider {
            border: none;
            border-top: 1px solid #2a2a1e;
            margin: 1.75rem auto;
            width: 60%;
        }

        .note {
            font-size: 0.85rem;
            color: #6a5a3a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="gem">
            <!-- Simple gem shape -->
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="50,5 95,35 95,65 50,95 5,65 5,35"
                         fill="#1a3a1a" stroke="#a5f3a5" stroke-width="3"/>
                <polygon points="50,20 80,38 80,62 50,80 20,62 20,38"
                         fill="#2a5a2a" stroke="#c8ffc8" stroke-width="1.5" opacity="0.7"/>
                <polygon points="50,5 95,35 50,50" fill="#3a8a3a" opacity="0.4"/>
            </svg>
        </div>

        <h1>Authorization Successful</h1>
        <p>Your Path of Exile account has been linked to Archipelago.</p>

        <hr class="divider">

        <p class="note">You may close this tab and return to the game.</p>
    </div>
</body>
</html>
