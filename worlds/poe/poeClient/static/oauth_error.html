<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archipelago PoE — Authorization Failed</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0d0d;
            color: #c8b99a;
            font-family: 'Georgia', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 540px;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
            color: #c84a4a;
            text-shadow: 0 0 20px #c84a4a88;
        }

        h1 {
            font-size: 1.8rem;
            color: #e8a0a0;
            margin-bottom: 0.75rem;
            letter-spacing: 0.04em;
        }

        p {
            font-size: 1rem;
            color: #9a8a6a;
            line-height: 1.6;
        }

        .divider {
            border: none;
            border-top: 1px solid #2a1a1a;
            margin: 1.75rem auto;
            width: 60%;
        }

        .note {
            font-size: 0.85rem;
            color: #6a4a3a;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">&#10007;</span>

        <h1>Authorization Failed</h1>
        <p>No authorization code was received from Path of Exile.</p>

        <hr class="divider">

        <p class="note">Close this tab, restart the client, and try again.</p>
    </div>
</body>
</html>
